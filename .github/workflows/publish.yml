name: Publish npm

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'package-lock.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build:publish

      - run: npm test

      - run: npm publish -w lotaru --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
